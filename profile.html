<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <!-- Firebase Config -->
    <script src="firebase-console.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Ensure user is logged in
            firebase.auth().onAuthStateChanged(user => {
                if (!user) {
                    window.location.href = "https://donatetostream.github.io/";
                }
            });

            const db = firebase.database();

            // Load and display links dynamically in a grid
            function loadLinks() {
                const linksContainer = document.getElementById("links-container");

                db.ref("links").once("value").then(snapshot => {
                    const links = snapshot.val();
                    if (!links) {
                        linksContainer.innerHTML = "<p>No links available</p>";
                        return;
                    }

                    // Clear the container first
                    linksContainer.innerHTML = '';

                    // Loop through each category and display its links
                    for (let category in links) {
                        const categoryDiv = document.createElement("div");
                        categoryDiv.classList.add("category");
                        categoryDiv.innerHTML = `<h3>${category.replace(/([A-Z])/g, ' $1').toUpperCase()}</h3>`;
                        linksContainer.appendChild(categoryDiv);

                        const linkGrid = document.createElement("div");
                        linkGrid.classList.add("link-grid");

                        for (let key in links[category]) {
                            const link = links[category][key];
                            const linkButton = document.createElement("button");
                            linkButton.classList.add("link-button");
                            linkButton.innerText = link.url;
                            linkButton.onclick = () => showAdAndOpenLink(link.url);

                            linkGrid.appendChild(linkButton);
                        }

                        categoryDiv.appendChild(linkGrid);
                    }
                });
            }

            // Show ad and then open the link
            function showAdAndOpenLink(url) {
                // Simulating an ad display
                const adModal = document.createElement("div");
                adModal.classList.add("ad-modal");
                adModal.innerHTML = `
                    <div class="ad-content">
                        <h2>Enjoy this short ad!</h2>
                        <p>Ad content goes here</p>
                        <button onclick="openLink('${url}')">Close Ad and Go to Link</button>
                    </div>
                `;
                document.body.appendChild(adModal);
            }

            // Open the link in a new tab after the ad
            function openLink(url) {
                window.open(url, "_blank");
                const adModal = document.querySelector(".ad-modal");
                adModal.remove();  // Close the ad modal
            }

            // Load the links when the page is loaded
            loadLinks();

            window.logout = function() {
                firebase.auth().signOut().then(() => {
                    window.location.href = "https://donatetostream.github.io/";
                });
            };
        });
    </script>

    <style>
        /* Overall page styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Top bar styles */
        .top-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            background-color: #333;
            color: white;
            position: relative;
        }

        .top-bar h2 {
            margin: 0;
            font-size: 24px;
        }

        .logout-btn {
            background-color: red;
            color: white;
            border: none;
            padding: 8px;
            cursor: pointer;
            position: absolute;
            left: 10px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            text-align: center;
        }

        .back-home-btn {
            background-color: blue;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            position: absolute;
            right: 10px;
        }

        /* Button styles */
        .button-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .button-container button {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            margin: 5px;
            border: none;
            cursor: pointer;
            width: 200px;
        }

        .button-container button:hover {
            background-color: #45a049;
        }

        /* Link grid and category layout */
        #links-container {
            margin: 20px;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }

        .category {
            width: 100%;
            margin-bottom: 20px;
        }

        .category h3 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            justify-items: center;
        }

        .link-button {
            background-color: #2196F3;
            color: white;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            border: none;
            text-align: center;
            box-sizing: border-box;
        }

        .link-button:hover {
            background-color: #0b7dda;
        }

        /* Modal (Ad) Styles */
        .ad-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .ad-content {
            background-color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            max-width: 500px;
            width: 80%;
        }

        .ad-content button {
            background-color: green;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            margin-top: 15px;
        }

        .ad-content button:hover {
            background-color: #45a049;
        }
    </style>

</head>
<body>

    <!-- Top Bar -->
    <div class="top-bar">
        <button class="logout-btn" onclick="logout()">Logout</button>
        <h2>Profile</h2>
        <button class="back-home-btn" onclick="window.location.href='home.html'">Back to Home</button>
    </div>

    <!-- Links Section -->
    <div id="links-container">
        <!-- Links will be dynamically loaded here -->
    </div>

</body>
</html>
