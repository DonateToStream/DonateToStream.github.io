<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase Authentication</title>

  <!-- Firebase SDKs (Modular v9) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
    import { RecaptchaVerifier } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBxm9scK9bWxue782r8w2xNR_thS1y9-q4",
      authDomain: "dhjrjtdzjg.firebaseapp.com",
      databaseURL: "https://dhjrjtdzjg-default-rtdb.firebaseio.com",
      projectId: "dhjrjtdzjg",
      storageBucket: "dhjrjtdzjg.firebasestorage.app",
      messagingSenderId: "548960975194",
      appId: "1:548960975194:web:fc9596a8cae353883d9b63",
      measurementId: "G-BPJJSQV4Z6"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app); // Get Auth instance from Firebase

    // Login Function
    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          const user = userCredential.user;
          console.log("Logged in as:", user.email);
          window.location.href = "home.html"; // Redirect to home page after login
        })
        .catch((error) => {
          const errorCode = error.code;
          const errorMessage = error.message;
          console.error("Login error:", errorCode, errorMessage);
        });
    }

    // Sign-up Function
    function signup() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          const user = userCredential.user;
          console.log("Signed up as:", user.email);
          window.location.href = "home.html"; // Redirect to home page after sign up
        })
        .catch((error) => {
          const errorCode = error.code;
          const errorMessage = error.message;
          console.error("Signup error:", errorCode, errorMessage);
        });
    }

    // Password Reset Function
    function resetPassword() {
      const email = document.getElementById("email").value;

      sendPasswordResetEmail(auth, email)
        .then(() => {
          alert("Password reset email sent!");
        })
        .catch((error) => {
          const errorCode = error.code;
          const errorMessage = error.message;
          console.error("Password reset error:", errorCode, errorMessage);
        });
    }

    // 2FA Enable Function
    function enable2FA() {
      const phoneNumber = document.getElementById("phoneNumber").value;
      const appVerifier = new RecaptchaVerifier('recaptcha-container', {
        size: 'invisible',
        callback: function(response) {
          // Success callback
        }
      }, auth);

      appVerifier.verify().then(function() {
        auth.currentUser.linkWithPhoneNumber(phoneNumber, appVerifier)
        .then(function(confirmationResult) {
          const verificationCode = prompt("Enter the verification code sent to your phone:");
          return confirmationResult.confirm(verificationCode);
        })
        .then(function(result) {
          alert("2FA has been enabled successfully.");
        })
        .catch(function(error) {
          console.error("Error enabling 2FA:", error.message);
          alert("Failed to enable 2FA: " + error.message);
        });
      });
    }

  </script>
</head>
<body>
  <h1>Firebase Authentication</h1>
  <h2>Login</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>

  <h2>Sign Up</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>

  <h2>Reset Password</h2>
  <input type="email" id="email" placeholder="Enter your email">
  <button onclick="resetPassword()">Reset Password</button>

  <div id="recaptcha-container"></div>

  <h2>Enable 2FA</h2>
  <input type="text" id="phoneNumber" placeholder="Enter phone number">
  <button onclick="enable2FA()">Enable 2FA</button>
</body>
</html>
