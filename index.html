<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Auth & Ads</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            min-height: 80vh;
            margin: 20px 0;
        }
        .ad-left, .ad-right {
            width: 160px;
            min-height: 600px;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .content {
            flex: 1;
            padding: 20px;
            text-align: center;
            background: white;
        }
        .ad-bottom {
            width: 100%;
            min-height: 90px;
            background-color: #f0f0f0;
            text-align: center;
            margin-top: 20px;
        }
        .form-container {
            max-width: 300px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            background: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js"></script>
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7099868100329345" crossorigin="anonymous"></script>
</head>
<body>

    <div class="container">
        <div class="ad-left">
            <!-- Left Ad -->
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-7099868100329345"
                 data-ad-slot="1541076717"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

        <div class="content">
            <h1>Welcome to My Site</h1>
            <div class="form-container">
                <h2>Login</h2>
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Password">
                <button onclick="login()">Login</button>
                <button onclick="signup()">Sign Up</button>
                <button onclick="resetPassword()">Forgot Password?</button>
            </div>
            <p id="status"></p>
            <button onclick="logout()" style="display:none;" id="logoutBtn">Logout</button>
        </div>

        <div class="ad-right">
            <!-- Right Ad -->
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-7099868100329345"
                 data-ad-slot="2854158385"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </div>

    <div class="ad-bottom">
        <!-- Bottom Ad -->
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-7099868100329345"
             data-ad-slot="4050887652"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <script>
        // Your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBxm9scK9bWxue782r8w2xNR_thS1y9-q4",
            authDomain: "dhjrjtdzjg.firebaseapp.com",
            projectId: "dhjrjtdzjg",
            storageBucket: "dhjrjtdzjg.firebasestorage.app",
            messagingSenderId: "548960975194",
            appId: "1:548960975194:web:fc9596a8cae353883d9b63"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function signup() {
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            auth.createUserWithEmailAndPassword(email, password)
                .then(() => {
                    document.getElementById("status").innerText = "Account created! You can now log in.";
                })
                .catch(error => document.getElementById("status").innerText = error.message);
        }

        function login() {
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    document.getElementById("status").innerText = "Logged in!";
                    document.getElementById("logoutBtn").style.display = "block";
                })
                .catch(error => document.getElementById("status").innerText = error.message);
        }

        function resetPassword() {
            let email = document.getElementById("email").value;
            if (email) {
                auth.sendPasswordResetEmail(email)
                    .then(() => document.getElementById("status").innerText = "Password reset link sent to email.")
                    .catch(error => document.getElementById("status").innerText = error.message);
            } else {
                document.getElementById("status").innerText = "Enter your email to reset password.";
            }
        }

        function logout() {
            auth.signOut().then(() => {
                document.getElementById("status").innerText = "Logged out!";
                document.getElementById("logoutBtn").style.display = "none";
            });
        }
    </script>

</body>
</html>
