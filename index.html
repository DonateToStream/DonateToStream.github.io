<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Auth</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 400px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            background: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Firebase Authentication</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <button onclick="signup()">Sign Up</button>
        <button onclick="resetPassword()">Forgot Password?</button>
        <p id="status"></p>
        <button onclick="logout()" style="display:none;" id="logoutBtn">Logout</button>
    </div>

    <!-- Firebase SDK via CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js"></script>

    <script>
        // ✅ Replace with your Firebase config
        const firebaseConfig = {
    apiKey: "AIzaSyBxm9scK9bWxue782r8w2xNR_thS1y9-q4",
    authDomain: "dhjrjtdzjg.firebaseapp.com",
    databaseURL: "https://dhjrjtdzjg-default-rtdb.firebaseio.com",
    projectId: "dhjrjtdzjg",
    storageBucket: "dhjrjtdzjg.firebasestorage.app",
    messagingSenderId: "548960975194",
    appId: "1:548960975194:web:fc9596a8cae353883d9b63",
  };

        // ✅ Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function signup() {
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            auth.createUserWithEmailAndPassword(email, password)
                .then(() => {
                    document.getElementById("status").innerText = "Account created! You can now log in.";
                })
                .catch(error => document.getElementById("status").innerText = error.message);
        }

        function login() {
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    document.getElementById("status").innerText = "Logged in!";
                    document.getElementById("logoutBtn").style.display = "block";
                })
                .catch(error => document.getElementById("status").innerText = error.message);
        }

        function resetPassword() {
            let email = document.getElementById("email").value;
            if (!email) {
                document.getElementById("status").innerText = "Enter your email to reset password.";
                return;
            }

            auth.sendPasswordResetEmail(email)
                .then(() => document.getElementById("status").innerText = "Password reset email sent!")
                .catch(error => document.getElementById("status").innerText = error.message);
        }

        function logout() {
            auth.signOut().then(() => {
                document.getElementById("status").innerText = "Logged out!";
                document.getElementById("logoutBtn").style.display = "none";
            });
        }
    </script>

</body>
</html>
