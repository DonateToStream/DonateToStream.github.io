<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Portal</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #111;
            color: white;
        }
        #topbar {
            width: 100%;
            background: #222;
            padding: 10px;
            text-align: left;
            position: fixed;
            top: 0;
            left: 0;
        }
        #topbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
        }
        #content {
            margin-top: 60px;
        }
        #codeScreen, #gameContainer, #adContainer {
            display: none;
        }
        #clickToPlay {
            width: 800px;
            height: 600px;
            background-color: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            margin: auto;
        }
    </style>
</head>
<body>

    <!-- Top Navigation Bar -->
    <div id="topbar">
        <a href="#">Game 1</a>
        <a href="#">Game 2</a>
        <a href="#">Game 3</a>
    </div>

    <div id="content">
        <!-- Code Entry Screen -->
        <div id="codeScreen">
            <h2>Enter Access Code</h2>
            <input type="text" id="codeInput">
            <button onclick="checkCode()">Enter</button>
            <p id="errorMessage" style="color: red;"></p>
        </div>

        <!-- Click to Play Button -->
        <div id="clickToPlay" onclick="showAd()">CLICK TO PLAY</div>

        <!-- Ad Container -->
        <div id="adContainer">
            <h2>Ad is playing...</h2>
            <!-- AdSense Ad -->
            <ins class="adsbygoogle"
                style="display:block"
                data-ad-client="YOUR-ADSENSE-ID"
                data-ad-slot="YOUR-AD-SLOT-ID"
                data-ad-format="auto"
                data-full-width-responsive="true"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

        <!-- Game Container -->
        <div id="gameContainer">
            <h2>Your Game</h2>
            <iframe id="gameFrame" width="800" height="600" style="border:none;"></iframe>
        </div>
    </div>

    <script>
        let validCode = "1234"; // Change this to your actual access code

        // Show code entry screen on page load
        window.onload = function() {
            document.getElementById("codeScreen").style.display = "block";
        };

        function checkCode() {
            let enteredCode = document.getElementById("codeInput").value;
            if (enteredCode === validCode) {
                document.getElementById("codeScreen").style.display = "none";
                document.getElementById("clickToPlay").style.display = "flex";
            } else {
                document.getElementById("errorMessage").innerText = "Invalid code!";
            }
        }

        function showAd() {
            document.getElementById("clickToPlay").style.display = "none";
            document.getElementById("adContainer").style.display = "block";

            // Wait 10 seconds (simulating ad time), then load the game
            setTimeout(function() {
                document.getElementById("adContainer").style.display = "none";
                document.getElementById("gameContainer").style.display = "block";
                document.getElementById("gameFrame").src = "https://your-game-url.com"; // Change this to your game link
            }, 10000);
        }
    </script>

</body>
</html>
