<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Game</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
    
    <!-- AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7099868100329345" crossorigin="anonymous"></script>
</head>
<body>
    <!-- Navigation Bar -->
    <div id="navbar">
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/game">Game</a></li>
                <!-- More links can be added here -->
            </ul>
        </nav>
    </div>

    <!-- Authentication Form -->
    <div id="auth-form" class="auth-form">
        <h2>Sign Up / Login</h2>
        <input type="email" id="email" placeholder="Email" required><br>
        <input type="password" id="password" placeholder="Password" required><br>
        <button onclick="signUp()">Sign Up</button>
        <button onclick="logIn()">Log In</button>
        <div id="error-message"></div>
    </div>

    <!-- "Click to Play" Button -->
    <div id="game-section" style="display:none;">
        <button onclick="showAd()">Click to Play</button>
    </div>

    <!-- Game Embed (Initially hidden until after ad) -->
    <div id="game-container" style="display:none;">
        <iframe src="YOUR_GAME_URL" width="100%" height="600"></iframe>
    </div>

    <script src="app.js"></script>
</body>
</html>
