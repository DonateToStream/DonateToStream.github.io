<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad-Supported GitHub Pages Site</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            min-height: 80vh;
            margin: 20px 0;
        }
        .ad-left, .ad-right {
            width: 160px;
            min-height: 600px;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .content {
            flex: 1;
            padding: 20px;
            text-align: center;
            background: white;
        }
        .ad-bottom {
            width: 100%;
            min-height: 90px;
            background-color: #f0f0f0;
            text-align: center;
            margin-top: 20px;
        }
    </style>
    <!-- Google AdSense Script -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7099868100329345" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <div class="ad-left">
            <!-- Left Ad -->
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-7099868100329345"
                 data-ad-slot="1541076717"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

        <div class="content">
            <h1>Welcome to My Site</h1>
            <p>This is a GitHub Pages site with ads.</p>
        </div>

        <div class="ad-right">
            <!-- Right Ad -->
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-7099868100329345"
                 data-ad-slot="2854158385"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </div>

    <div class="ad-bottom">
        <!-- Bottom Ad -->
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-7099868100329345"
             data-ad-slot="4050887652"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>
</body>
</html>
