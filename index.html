<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Voting Site</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="navbar">
        <button onclick="showPage('home')">Home</button>
        <button onclick="showPage('links')">Links</button>
    </div>

    <div id="home" class="page">
        <h1>Welcome to the Link Voting Site</h1>
        <p>Go to the "Links" tab to browse and vote on links.</p>
    </div>

    <div id="links" class="page" style="display: none;">
        <h1>Links</h1>
        <div class="category">
            <h2>Proxy Links</h2>
            <div id="proxy-links"></div>
        </div>
        <div class="category">
            <h2>Game Links</h2>
            <div id="game-links"></div>
        </div>
    </div>

    <div id="vote-popup" class="popup">
        <p>Before you go, open the link in a new tab and come back to vote if it's working.</p>
        <button id="vote-yes">Working</button>
        <button id="vote-no">Not Working</button>
    </div>
</body>
</html>
