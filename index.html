<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; }
        .container { max-width: 400px; padding: 20px; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #007bff; color: white; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="container" id="loginContainer">
        <h2>Login / Sign Up</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <button onclick="signup()">Sign Up</button>
        <button onclick="resetPassword()">Forgot Password?</button>
        <p id="status"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <!-- Add reCAPTCHA script in the header -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<!-- Add this code to your page for reCAPTCHA -->
<div id="recaptcha-container"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBxm9scK9bWxue782r8w2xNR_thS1y9-q4",
            authDomain: "dhjrjtdzjg.firebaseapp.com",
            databaseURL: "https://dhjrjtdzjg-default-rtdb.firebaseio.com",
            projectId: "dhjrjtdzjg",
            storageBucket: "dhjrjtdzjg.firebasestorage.app",
            messagingSenderId: "548960975194",
            appId: "1:548960975194:web:fc9596a8cae353883d9b63",
            measurementId: "G-BPJJSQV4Z6"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function signup() {
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    document.getElementById("status").innerText = "Account created! Redirecting...";
                    setTimeout(() => { window.location.href = "home.html"; }, 1000);
                })
                .catch(error => document.getElementById("status").innerText = error.message);
        }

        function login() {
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    document.getElementById("status").innerText = "Logged in! Redirecting...";
                    setTimeout(() => { window.location.href = "home.html"; }, 1000);
                })
                .catch(error => document.getElementById("status").innerText = error.message);
        }

        function resetPassword() {
            let email = document.getElementById("email").value;
            if (!email) {
                document.getElementById("status").innerText = "Enter your email.";
                return;
            }
            auth.sendPasswordResetEmail(email)
                .then(() => document.getElementById("status").innerText = "Password reset email sent!")
                .catch(error => document.getElementById("status").innerText = error.message);
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.href = "home.html"; // Redirect if already logged in
            }
        });
    </script>

</body>
</html>
