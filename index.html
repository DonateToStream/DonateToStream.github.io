<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline' * https://pagead2.googlesyndication.com;">
    <title>Link Buttons with Ads</title>
    <script type="module">
        // Import Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-analytics.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBVx-V7DHGnWxwp5iqwrhPqBLnjf-frnT4",
            authDomain: "sigmasigma-57fca.firebaseapp.com",
            databaseURL: "https://sigmasigma-57fca-default-rtdb.firebaseio.com",
            projectId: "sigmasigma-57fca",
            storageBucket: "sigmasigma-57fca.firebasestorage.app",
            messagingSenderId: "1071388845488",
            appId: "1:1071388845488:web:29b0b30532dd070a03e275",
            measurementId: "G-JZJJ42L6KS"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const analytics = getAnalytics(app);

        // Fetch buttons from Firebase Realtime Database
        function loadButtons() {
            const buttonsContainer = document.getElementById('buttons-container');
            const buttonsRef = ref(db, 'buttons');  // Path to your buttons data in the DB
            
            get(buttonsRef).then((snapshot) => {
                if (snapshot.exists()) {
                    const buttons = snapshot.val();
                    for (const buttonId in buttons) {
                        const buttonData = buttons[buttonId];
                        const button = document.createElement("button");
                        button.textContent = buttonData.name;
                        button.onclick = () => showAdAndOpenLink(buttonData.url);
                        buttonsContainer.appendChild(button);
                    }
                } else {
                    console.log("No data available");
                }
            }).catch((error) => {
                console.error("Error getting data: ", error);
            });
        }

        // Show Ad and then open link
        function showAdAndOpenLink(url) {
            // Show the ad (wait for user interaction)
            const adContainer = document.getElementById('ad-container');
            adContainer.style.display = 'block'; // Show ad placeholder
            (adsbygoogle = window.adsbygoogle || []).push({});
            
            setTimeout(() => {
                adContainer.style.display = 'none'; // Hide ad after 5 seconds
                window.open(url, '_blank');
            }, 5000); // Wait 5 seconds before opening the link
        }

        window.onload = () => loadButtons();
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7099868100329345"></script>
</head>
<body>
    <h1>Click a Button to Open a Link</h1>
    <div id="buttons-container"></div>
    
    <!-- Ad Container -->
    <div id="ad-container" style="display:none;">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-7099868100329345"
             data-ad-slot="XXXXXX"
             data-ad-format="auto"></ins>
    </div>
</body>
</html>
