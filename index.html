<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad-Powered Redirect</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7099868100329345"
     crossorigin="anonymous"></script>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px; cursor: pointer; }
        #ad-container { display: none; margin-top: 20px; }
        #persistent-ad { position: fixed; right: 10px; top: 50%; transform: translateY(-50%); }
    </style>
</head>
<body>
    <h1>Choose an Option</h1>
    <button onclick="showAd('https://example.com')">Visit Example</button>
    <button onclick="showAd('https://another-site.com')">Visit Another Site</button>
    
    <!-- Persistent Ad on the Right -->
    <div id="persistent-ad">
        <ins class="adsbygoogle"
            style="display:block"
            data-ad-client="ca-pub-7099868100329345"
            data-ad-slot="7622435183"
            data-ad-format="auto"
            data-full-width-responsive="true"></ins>
        <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>
    
    <div id="ad-container">
        <p>Viewing Ad... Please wait</p>
        <ins class="adsbygoogle"
            style="display:block"
            data-ad-client="ca-pub-7099868100329345"
            data-ad-slot="XXXXXXXXXX"
            data-ad-format="auto"></ins>
        <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <script>
        function showAd(targetUrl) {
            document.getElementById('ad-container').style.display = 'block';
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 7000); // 7-second delay before redirect
        }
    </script>
</body>
</html>
