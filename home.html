<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Firebase Authentication</title>

  <script type="module">
    import { getAuth, updateEmail, updatePassword } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

    const auth = getAuth();

    // Password Change Function
    function changePassword() {
      const newPassword = document.getElementById("newPassword").value;
      
      updatePassword(auth.currentUser, newPassword)
        .then(() => {
          alert("Password changed successfully.");
        })
        .catch((error) => {
          console.error("Password change error:", error.message);
          alert("Failed to change password: " + error.message);
        });
    }

    // Email Change Function
    function changeEmail() {
      const newEmail = document.getElementById("newEmail").value;
      
      updateEmail(auth.currentUser, newEmail)
        .then(() => {
          alert("Email changed successfully.");
        })
        .catch((error) => {
          console.error("Email change error:", error.message);
          alert("Failed to change email: " + error.message);
        });
    }
  </script>
</head>
<body>
  <h1>Welcome to Your Home Page!</h1>

  <h2>Change Email</h2>
  <input type="email" id="newEmail" placeholder="New Email">
  <button onclick="changeEmail()">Change Email</button>

  <h2>Change Password</h2>
  <input type="password" id="newPassword" placeholder="New Password">
  <button onclick="changePassword()">Change Password</button>

  <h2>Enable 2FA</h2>
  <p>If you want to enable 2FA, please go back to the login page and follow the process.</p>
</body>
</html>
