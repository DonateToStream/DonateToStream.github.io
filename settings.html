<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        <h2>Settings</h2>
        <a href="home.html" class="back-button">⬅️</a>
    </div>
    
    <h3>Enable/Disable 2FA</h3>
    <button onclick="enable2FA()">Enable 2FA</button>
    <button onclick="disable2FA()">Disable 2FA</button>

    <h3>Change Email</h3>
    <input type="email" id="new-email" placeholder="Enter new email">
    <button onclick="changeEmail()">Change Email</button>

    <h3>Enable SMS Authentication</h3>
    <input type="text" id="phone-number" placeholder="Enter phone number">
    <button onclick="sendOTP()">Send OTP</button>
    <input type="text" id="otp-code" placeholder="Enter OTP">
    <button onclick="verifyOTP()">Verify</button>
    <div id="recaptcha-container"></div>

    <h3>Change Password</h3>
    <button onclick="changePassword()">Request Password Change</button>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        firebase.auth().onAuthStateChanged(user => {
            if (!user) {
                window.location.href = "https://donatetostream.github.io/";
            }
        });
    });
</script>

   <!-- Firebase SDK (use compat mode) -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<!-- Your Firebase Config & App Logic -->
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
